<!DOCTYPE html>
<html>
<head>
    <title>Yaksha Recovery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="background:#222; color:white; text-align:center;">
    <h1>Yaksha Bot</h1>
    <p id="status">Status: Disconnected</p>
    <button style="padding:20px;" onclick="connect()">CONNECT ROBOT</button>
    <hr>
    <button style="width:100px; height:100px;" onclick="send('F')">FWD</button><br>
    <button style="width:100px; height:100px;" onclick="send('L')">LEFT</button>
    <button style="width:100px; height:100px;" onclick="send('S')">STOP</button>
    <button style="width:100px; height:100px;" onclick="send('R')">RIGHT</button><br>
    <button style="width:100px; height:100px;" onclick="send('B')">BACK</button>

    <script>
        let robotChar;
        async function connect() {
            document.getElementById('status').innerText = "Status: Searching...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['19b10000-e8f2-537e-4f3c-d104768a1214']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('19b10000-e8f2-537e-4f3c-d104768a1214');
                robotChar = await service.getCharacteristic('19b10001-e8f2-537e-4f3c-d104768a1214');
                document.getElementById('status').innerText = "Status: CONNECTED!";
                alert("Connected to " + device.name);
            } catch (err) {
                document.getElementById('status').innerText = "Status: Error";
                alert("Bluetooth Error: " + err);
            }
        }

        async function send(val) {
            if (robotChar) {
                try {
                    await robotChar.writeValue(new TextEncoder().encode(val));
                } catch (e) { console.log(e); }
            }
        }
    </script>
</body>
</html>
