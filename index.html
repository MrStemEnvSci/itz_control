<script>
    let char;

    async function connectBLE() {
        console.log("Attempting to connect...");
        try {
            // This 'acceptAllDevices' version is the most compatible for Bluefy
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['19b10000-e8f2-537e-4f3c-d104768a1214']
            });

            console.log("Device selected:", device.name);
            const server = await device.gatt.connect();
            
            console.log("Connected to server");
            const service = await server.getPrimaryService('19b10000-e8f2-537e-4f3c-d104768a1214');
            
            console.log("Service found");
            char = await service.getCharacteristic('19b10001-e8f2-537e-4f3c-d104768a1214');
            
            alert("Connected to " + device.name);
        } catch (e) {
            console.log("Error:", e);
            alert("Connection Failed: " + e);
        }
    }

    function send(val) {
        if (char) {
            char.writeValue(new TextEncoder().encode(val));
        } else {
            console.log("Not connected yet!");
        }
    }
</script>
